# _quarto.yml — Configuración del proyecto Quarto para el informe técnico.
# Documentación: https://quarto.org/docs/projects/

project:
  type: default
  title: "Wired Apart"

# Bibliografía (BibTeX)
bibliography: references/references.bib
csl: references/apa.csl

# Formatos de salida
format:
  html:
    # theme: default — usa las fuentes serif de Bootstrap (consistente
    # en títulos y cuerpo). Diego prefiere la fuente default antes que
    # cosmo (que mezcla sans-serif en títulos con serif en cuerpo).
    theme: default
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: true
    code-fold: true
    code-tools: true
    fig-width: 8
    fig-height: 5
    fig-dpi: 200
    embed-resources: true
  pdf:
    documentclass: scrartcl
    papersize: letter
    toc: true
    # El TOC comparte espacio con el resto del front matter (abstract, etc.)
    # Diego prefiere que el TOC no esté en una página aislada.
    number-sections: true
    fig-width: 7
    fig-height: 4.5
    fig-dpi: 200
    include-in-header:
      text: |
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyhead[L]{\small Wired Apart}
        \fancyhead[R]{\small Diego Hernández}
        \fancyfoot[C]{\thepage}

# Ejecución: ocultamos el código en el HTML por defecto
execute:
  echo: false
  warning: false
  cache: true
  freeze: auto

# Directorio de salida
output-dir: reports
