# _quarto.yml — Configuración del proyecto Quarto para el informe técnico.
# Documentación: https://quarto.org/docs/projects/

project:
  type: default
  title: "Wired Apart"

# Bibliografía (BibTeX exportado a partir del .bib del libro)
bibliography: references/references.bib
csl: references/apa.csl

# Formatos de salida
format:
  html:
    # theme: default — usa las fuentes serif de Bootstrap (consistente
    # en títulos y cuerpo). Diego prefiere la fuente default antes que
    # cosmo (que mezcla sans-serif en títulos con serif en cuerpo).
    theme: default
    toc: true
    toc-depth: 3
    toc-location: right
    number-sections: true
    code-fold: true
    code-tools: true
    fig-width: 8
    fig-height: 5
    fig-dpi: 200
    embed-resources: true
  pdf:
    documentclass: scrartcl
    papersize: letter
    toc: true
    # El TOC va en su propia página, antes y después del contenido
    toc-title-page: true
    # Forzar salto de página después del TOC
    include-after-body:
      text: |
        \clearpage
    number-sections: true
    fig-width: 7
    fig-height: 4.5
    fig-dpi: 200
    # mainfont = lmodern por default; con scrartcl ya es serif coherente
    include-in-header:
      text: |
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyhead[L]{\small Wired Apart}
        \fancyhead[R]{\small Diego Hernández}
        \fancyfoot[C]{\thepage}
        % Forzar página propia para el TOC: salto antes del abstract
        \usepackage{etoolbox}
        \AtBeginDocument{\let\origmaketitle\maketitle
          \renewcommand{\maketitle}{\origmaketitle\clearpage}}

# Ejecución: ocultamos el código en el HTML por defecto (se puede expandir con los code-tools)
execute:
  echo: false
  warning: false
  cache: true
  freeze: auto

# Directorio de salida
output-dir: reports

# Recursos (figuras auxiliares, logo)
# NOTA: el path es relativo al directorio de salida (reports/).
# Por eso listamos `logo-unimet.png` aquí, no `reports/logo-unimet.png`.
resources:
  - logo-unimet.png
