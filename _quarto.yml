# _quarto.yml — Configuración del proyecto Quarto para el informe técnico.
# Documentación: https://quarto.org/docs/projects/

project:
  type: default
  title: "Wired Apart"

# Bibliografía (BibTeX)
bibliography: references/references.bib
csl: references/apa.csl

# Formatos de salida
format:
  html:
    # theme: default usa fuentes serif en el cuerpo. Forzamos serif
    # también en los headings via styles.css.
    theme: default
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    # NO usamos number-sections: los headings del qmd ya tienen
    # número literal (1, 2, 3, ...) para evitar duplicación 5.7. 4.7.
    code-fold: true
    code-tools: true
    fig-width: 8
    fig-height: 5
    fig-dpi: 200
    embed-resources: true
  pdf:
    documentclass: scrartcl
    papersize: letter
    toc: true
    # NO usamos number-sections: los headings del qmd ya tienen
    # número literal (1, 2, 3, ...) para evitar duplicación 5.7. 4.7.
    fig-width: 7
    fig-height: 4.5
    fig-dpi: 200
    include-in-header:
      text: |
        \usepackage{fancyhdr}
        \pagestyle{fancy}
        \fancyhead[L]{\small Wired Apart}
        \fancyhead[R]{\small Diego Hernández}
        \fancyfoot[C]{\thepage}
        % Forzar serif en todos los headings (KOMA-Script usa sans por default)
        \setkomafont{disposition}{\rmfamily\bfseries}
        \addtokomafont{section}{\rmfamily\bfseries}
        \addtokomafont{subsection}{\rmfamily\bfseries}
        \addtokomafont{subsubsection}{\rmfamily\bfseries}
        \addtokomafont{paragraph}{\rmfamily\bfseries}
        \addtokomafont{subparagraph}{\rmfamily\bfseries}

# Ejecución: ocultamos el código en el HTML por defecto
execute:
  echo: false
  warning: false
  cache: true
  freeze: auto

# Directorio de salida
output-dir: reports
